[alembic]
# Path to migration scripts folder
script_location = alembic

# Prepend sys.path with this value so `app` is importable during migrations.
# The % syntax references the alembic.ini directory.
prepend_sys_path = .

# Database URL is read dynamically from the app settings in env.py —
# this placeholder is intentionally left empty.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S